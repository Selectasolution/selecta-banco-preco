<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// =====================================================================
// CONFIGURAÇÃO
// =====================================================================
const CONFIG = {
  SUPABASE_URL: 'https://odamfhflldygdfrnnjzu.supabase.co',
  SUPABASE_ANON_KEY: 'sb_publishable_7q_884vzxsdTLOIw7ZMx7A_qiUuUc-n',
  PER_PAGE: 50,
};

const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// =====================================================================
// ESTADO
// =====================================================================
const state = {
  user: null,
  page: 0,
  total: 0,
  filters: { search: '', prefixo: '', marca: '', fornecedor: '' },
};

// =====================================================================
// HELPERS DE UI
// =====================================================================
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function show(el) { 
  if (typeof el === 'string') el = $(el); 
  el.classList.remove('hidden-section'); 
}

function hide(el) { 
  if (typeof el === 'string') el = $(el); 
  el.classList.add('hidden-section'); 
}

function fmtBRL(v) {
  if (v == null) return '—';
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtUSD(v) {
  if (v == null) return '—';
  return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// =====================================================================
// AUTH
// =====================================================================
async function tryLogin() {
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  hide('#login-error');

  if (!email || !password) {
    showLoginError('Preencha email e senha.');
    return;
  }

  const btn = $('#login-btn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  
  btn.disabled = false;
  btn.textContent = 'Entrar';

  if (error) {
    showLoginError(error.message === 'Invalid login credentials' 
      ? 'Email ou senha incorretos.' 
      : error.message);
    return;
  }

  state.user = data.user;
  enterApp();
}

function showLoginError(msg) {
  const el = $('#login-error');
  el.textContent = msg;
  show(el);
}

async function logout() {
  await sb.auth.signOut();
  state.user = null;
  hide('#app');
  show('#login-screen');
  $('#login-password').value = '';
}

async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    state.user = data.session.user;
    enterApp();
  }
}

function enterApp() {
  hide('#login-screen');
  show('#app');
  $('#user-email').textContent = state.user.email;
  switchTab('catalogo');
  loadFilters();
  loadCatalog();
}

// =====================================================================
// FILTROS
// =====================================================================
async function loadFilters() {
  // Distinct prefixos
  const { data: prefixosData } = await sb
    .from('produtos')
    .select('prefixo')
    .order('prefixo');
  
  if (prefixosData) {
    const prefixos = [...new Set(prefixosData.map(r => r.prefixo))].sort();
    const sel = $('#filter-prefixo');
    sel.innerHTML = '<option value="">Todos</option>' + 
      prefixos.map(p => `<option value="${p}">${p}</option>`).join('');
  }

  // Distinct marcas (top 50 com mais produtos pra não inflar o dropdown)
  const { data: marcasData } = await sb
    .from('produtos')
    .select('marca')
    .not('marca', 'is', null)
    .order('marca');
  
  if (marcasData) {
    const marcasCounts = {};
    marcasData.forEach(r => { if (r.marca) marcasCounts[r.marca] = (marcasCounts[r.marca] || 0) + 1; });
    const marcasTop = Object.entries(marcasCounts)
      .sort((a, b) => b[1] - a[1])
      .map(([m]) => m);
    
    const sel = $('#filter-marca');
    sel.innerHTML = '<option value="">Todas</option>' + 
      marcasTop.map(m => `<option value="${m}">${m}</option>`).join('');
  }
}

// =====================================================================
// CATÁLOGO
// =====================================================================
async function loadCatalog() {
  show('#catalog-loader');
  
  const start = state.page * CONFIG.PER_PAGE;
  const end = start + CONFIG.PER_PAGE - 1;

  let q = sb
    .from('produtos_com_ofertas')
    .select('*', { count: 'exact' })
    .range(start, end);

  // Filtros
  if (state.filters.prefixo) {
    q = q.eq('prefixo', state.filters.prefixo);
  }
  if (state.filters.marca) {
    q = q.eq('marca', state.filters.marca);
  }
  if (state.filters.fornecedor) {
    q = q.contains('fornecedores_disponiveis', [state.filters.fornecedor]);
  }
  if (state.filters.search) {
    const s = state.filters.search.trim();
    // Busca em código SLC ou descrição ou marca
    q = q.or(`codigo_slc.ilike.%${s}%,descricao.ilike.%${s}%,marca.ilike.%${s}%`);
  }

  q = q.order('codigo_slc');

  const { data, count, error } = await q;
  
  hide('#catalog-loader');
  
  if (error) {
    console.error('Erro ao carregar catálogo:', error);
    $('#catalog-tbody').innerHTML = `<tr><td colspan="7" class="px-3 py-6 text-center text-red-400">Erro: ${error.message}</td></tr>`;
    return;
  }

  state.total = count || 0;
  renderCatalog(data || []);
}

function renderCatalog(items) {
  const tbody = $('#catalog-tbody');
  
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="px-3 py-8 text-center text-gray-500">Nenhum produto encontrado com esses filtros.</td></tr>`;
  } else {
    tbody.innerHTML = items.map(p => `
      <tr class="product-row hover:bg-gray-700/50 cursor-pointer" data-id="${p.id}">
        <td class="px-3 py-2 font-mono text-xs text-primary-500">${p.codigo_slc}</td>
        <td class="px-3 py-2"><span class="bg-gray-700 text-xs px-1.5 py-0.5 rounded">${p.prefixo}</span></td>
        <td class="px-3 py-2 font-medium">${p.marca || '—'}</td>
        <td class="px-3 py-2 text-gray-300 max-w-xl truncate" title="${(p.descricao || '').replace(/"/g, '&quot;')}">${p.descricao || '—'}</td>
        <td class="px-3 py-2 text-right font-mono text-sm">$ ${fmtUSD(p.menor_usd)}</td>
        <td class="px-3 py-2 text-right font-mono text-sm">R$ ${fmtBRL(p.menor_brl)}</td>
        <td class="px-3 py-2 text-center text-xs text-gray-400">${(p.fornecedores_disponiveis || []).join(' + ') || '—'}</td>
      </tr>
    `).join('');
    
    // Click handler
    $$('#catalog-tbody tr[data-id]').forEach(tr => {
      tr.addEventListener('click', () => openProductDetail(tr.dataset.id));
    });
  }

  // Info + paginação
  const from = items.length > 0 ? state.page * CONFIG.PER_PAGE + 1 : 0;
  const to = state.page * CONFIG.PER_PAGE + items.length;
  $('#catalog-info').textContent = `${state.total.toLocaleString('pt-BR')} produto(s) encontrado(s)`;
  $('#page-info').textContent = `${from}–${to} de ${state.total.toLocaleString('pt-BR')}`;
  $('#page-prev').disabled = state.page === 0;
  $('#page-next').disabled = (state.page + 1) * CONFIG.PER_PAGE >= state.total;
}

function applyFilters() {
  state.filters.search = $('#filter-search').value;
  state.filters.prefixo = $('#filter-prefixo').value;
  state.filters.marca = $('#filter-marca').value;
  state.filters.fornecedor = $('#filter-fornecedor').value;
  state.page = 0;
  loadCatalog();
}

function clearFilters() {
  $('#filter-search').value = '';
  $('#filter-prefixo').value = '';
  $('#filter-marca').value = '';
  $('#filter-fornecedor').value = '';
  applyFilters();
}

// =====================================================================
// DETALHE DO PRODUTO (MODAL)
// =====================================================================
async function openProductDetail(produtoId) {
  // Busca produto + ofertas (com fornecedor)
  const { data: produto } = await sb
    .from('produtos')
    .select('*')
    .eq('id', produtoId)
    .single();
  
  if (!produto) return;

  const { data: ofertas } = await sb
    .from('ofertas')
    .select(`
      *,
      fornecedores ( nome_curto, nome )
    `)
    .eq('produto_id', produtoId)
    .order('preco_usd');

  $('#modal-codigo').textContent = produto.codigo_slc;
  $('#modal-prefixo').textContent = produto.prefixo;
  $('#modal-categoria').textContent = produto.categoria || '';
  $('#modal-marca').textContent = produto.marca || '—';
  $('#modal-descricao').textContent = produto.descricao || '';
  $('#modal-atributos').textContent = produto.atributos_tecnicos || '(Sem atributos cadastrados)';

  // Tags
  if (produto.tags && produto.tags.length > 0) {
    $('#modal-tags').innerHTML = produto.tags.map(t => 
      `<span class="bg-primary-900 text-primary-300 text-xs px-2 py-1 rounded">${t}</span>`
    ).join('');
    show('#modal-tags-wrapper');
  } else {
    hide('#modal-tags-wrapper');
  }

  // Ofertas
  const condicoesPT = {
    'novo': 'Novo',
    'novo_oem': 'Novo OEM',
    'recondicionado': 'Recondicionado',
    'usado': 'Usado',
    'swap': 'Swap',
  };
  const garantiasPT = {
    'br': 'BR',
    'py': 'PY',
    'fabricante': 'Fabricante',
    'sem_garantia': 'Sem garantia',
    'nao_declarada': '—',
  };

  $('#modal-ofertas-tbody').innerHTML = (ofertas || []).map(o => `
    <tr>
      <td class="px-3 py-2 font-medium">${o.fornecedores.nome_curto}</td>
      <td class="px-3 py-2 font-mono text-xs text-gray-400">${o.sku_fornecedor}</td>
      <td class="px-3 py-2 text-right font-mono">$ ${fmtUSD(o.preco_usd)}</td>
      <td class="px-3 py-2 text-right font-mono">R$ ${fmtBRL(o.preco_brl)}</td>
      <td class="px-3 py-2 text-xs">${condicoesPT[o.condicao] || o.condicao}</td>
      <td class="px-3 py-2 text-xs">${garantiasPT[o.garantia] || o.garantia}</td>
      <td class="px-3 py-2 text-center">${o.disponivel ? '✓' : '✗'}</td>
    </tr>
  `).join('');

  // Descrições originais
  $('#modal-desc-originais').innerHTML = (ofertas || []).map(o => 
    `<div><span class="text-primary-500">[${o.fornecedores.nome_curto}]</span> ${o.desc_original || '(sem descrição original)'}</div>`
  ).join('');

  show('#modal-product');
}

function closeModal() {
  hide('#modal-product');
}

// =====================================================================
// TABS
// =====================================================================
function switchTab(tabName) {
  $$('.tab-btn').forEach(btn => {
    if (btn.dataset.tab === tabName) {
      btn.classList.add('bg-primary-600', 'text-white');
      btn.classList.remove('text-gray-400', 'hover:bg-gray-700');
    } else {
      btn.classList.remove('bg-primary-600', 'text-white');
      btn.classList.add('text-gray-400', 'hover:bg-gray-700');
    }
  });
  
  hide('#tab-catalogo');
  hide('#tab-simulador');
  show(`#tab-${tabName}`);
}

// =====================================================================
// EVENT LISTENERS
// =====================================================================
$('#login-btn').addEventListener('click', tryLogin);
$('#login-password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
$('#login-email').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

$('#logout-btn').addEventListener('click', logout);

$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Filtros — debounce na busca
let searchTimer;
$('#filter-search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 300);
});
$('#filter-prefixo').addEventListener('change', applyFilters);
$('#filter-marca').addEventListener('change', applyFilters);
$('#filter-fornecedor').addEventListener('change', applyFilters);
$('#clear-filters').addEventListener('click', clearFilters);

// Paginação
$('#page-prev').addEventListener('click', () => { 
  if (state.page > 0) { state.page--; loadCatalog(); window.scrollTo(0, 0); } 
});
$('#page-next').addEventListener('click', () => { 
  state.page++; loadCatalog(); window.scrollTo(0, 0); 
});

// Modal
$('#modal-close').addEventListener('click', closeModal);
$('#modal-product').addEventListener('click', e => { 
  if (e.target === $('#modal-product')) closeModal(); 
});
document.addEventListener('keydown', e => { 
  if (e.key === 'Escape' && !$('#modal-product').classList.contains('hidden-section')) closeModal(); 
});

// =====================================================================
// INICIALIZAÇÃO
// =====================================================================
checkSession();

</script>

</body>
</html>
